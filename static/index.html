<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 0 24px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #555; }
        input::placeholder { color: #555; }

        button {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .result {
            margin-top: 24px;
            padding: 16px;
            background: #1a1a1a;
            border-radius: 8px;
            display: none;
        }

        .result.visible { display: block; }

        .result-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-url {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .result-url a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            word-break: break-all;
        }

        .result-url a:hover { text-decoration: underline; }

        .copy-btn {
            flex-shrink: 0;
            padding: 6px 14px;
            background: #2a2a2a;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            width: auto;
            font-weight: 500;
        }

        .copy-btn:hover { background: #333; opacity: 1; }

        .error {
            margin-top: 24px;
            padding: 16px;
            background: #1a1a1a;
            border-left: 3px solid #e55;
            border-radius: 8px;
            color: #e55;
            display: none;
        }

        .error.visible { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <p class="subtitle">Paste a long URL and get a short one.</p>

        <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" />
        <input type="text" id="customCode" placeholder="Custom code (optional)" />
        <button id="shortenBtn" onclick="shorten()">Shorten</button>

        <div class="result" id="result">
            <div class="result-label">Your short URL</div>
            <div class="result-url">
                <a id="shortUrl" href="" target="_blank"></a>
                <button class="copy-btn" onclick="copy()">Copy</button>
            </div>
        </div>

        <div class="error" id="error"></div>
    </div>

    <script>
        async function shorten() {
            const url = document.getElementById('urlInput').value.trim();
            const customCode = document.getElementById('customCode').value.trim();
            const btn = document.getElementById('shortenBtn');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            if (!url) return;

            result.classList.remove('visible');
            error.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'Shortening...';

            const body = { url };
            if (customCode) body.custom_code = customCode;

            try {
                const res = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    error.textContent = data.detail || 'Something went wrong.';
                    error.classList.add('visible');
                } else {
                    const link = document.getElementById('shortUrl');
                    link.href = data.short_url;
                    link.textContent = data.short_url;
                    result.classList.add('visible');
                }
            } catch (err) {
                error.textContent = 'Could not reach the server.';
                error.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Shorten';
            }
        }

        function copy() {
            const url = document.getElementById('shortUrl').textContent;
            navigator.clipboard.writeText(url);
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
        }

        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') shorten();
        });
    </script>
</body>
</html>
